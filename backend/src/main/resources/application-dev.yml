spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stampx}
    username: ${DB_USERNAME:stampx}
    password: ${DB_PASSWORD:stampx}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  flyway:
    baseline-on-migrate: true

logging:
  level:
    com.stampx: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
