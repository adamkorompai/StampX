spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
  flyway:
    baseline-on-migrate: false

server:
  servlet:
    session:
      cookie:
        secure: true
        same-site: strict

logging:
  level:
    com.stampx: INFO
    root: WARN
