spring:
  application:
    name: stampx-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    session:
      timeout: 24h
      cookie:
        same-site: lax
        http-only: true
        secure: false  # overridden in application-prod.yml

app:
  admin-secret: ${ADMIN_SECRET}
  pass-service-url: ${PASS_SERVICE_URL:http://localhost:3001}
  base-url: ${BASE_URL:http://localhost:8080}
  apple-pass-type-identifier: ${APPLE_PASS_TYPE_IDENTIFIER:pass.placeholder}
